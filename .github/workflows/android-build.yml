name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Install Capacitor
      run: npm install @capacitor/core @capacitor/cli @capacitor/android@5

    - name: Init Capacitor
      run: npx cap init "LineageDB" "com.fajar.lineage" --web-dir www

    - name: Add Android
      run: npx cap add android

    - name: Sync Capacitor
      run: npx cap sync

    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
