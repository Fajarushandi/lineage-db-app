name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Install Capacitor
      run: |
        npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5

    - name: Verify Capacitor CLI
      run: npx cap --version

    - name: Init Capacitor (SAFE CHECK)
      run: |
        if [ ! -f capacitor.config.json ]; then
          npx cap init "LineageDB" "com.fajar.lineage" --web-dir www
        fi

    - name: Add Android platform
      run: |
        npx cap add android || echo "Android already exists"

    - name: Sync Capacitor
      run: npx cap sync

    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: lineage-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
